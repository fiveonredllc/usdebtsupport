name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add SSH known_hosts
        run: mkdir -p ~/.ssh && ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy to Vultr
        uses: appleboy/ssh-action@v1.2.0
        env:
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          LEAD_API_SECRET: ${{ secrets.LEAD_API_SECRET }}
          SHEET_SHARED_SECRET: ${{ secrets.SHEET_SHARED_SECRET }}
          TURBODEBT_PARTNER_TOKEN: ${{ secrets.TURBODEBT_PARTNER_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GOOGLE_APPS_SCRIPT_URL,LEAD_API_SECRET,SHEET_SHARED_SECRET,TURBODEBT_PARTNER_TOKEN
          script: |
            cd /opt/apps/usdebtsupport
            git pull origin main || git clone github-usdebt:fiveonredllc/usdebtsupport.git .
            touch .env
            sed -i '/^GOOGLE_APPS_SCRIPT_URL=/d;/^LEAD_API_SECRET=/d;/^SHEET_SHARED_SECRET=/d;/^TURBODEBT_PARTNER_TOKEN=/d' .env
            printf 'GOOGLE_APPS_SCRIPT_URL=%s\n' "$GOOGLE_APPS_SCRIPT_URL" >> .env
            printf 'LEAD_API_SECRET=%s\n' "$LEAD_API_SECRET" >> .env
            printf 'SHEET_SHARED_SECRET=%s\n' "$SHEET_SHARED_SECRET" >> .env
            printf 'TURBODEBT_PARTNER_TOKEN=%s\n' "$TURBODEBT_PARTNER_TOKEN" >> .env
            export GOOGLE_APPS_SCRIPT_URL LEAD_API_SECRET SHEET_SHARED_SECRET TURBODEBT_PARTNER_TOKEN
            docker compose up -d --build
